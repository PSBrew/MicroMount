name: PS5 Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths-ignore:
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      archive_name: ${{ steps.package.outputs.archive_name }}
    steps:
      - name: Checkout Payload
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout pacbrew-repo
        uses: actions/checkout@v5
        with:
          repository: ps5-payload-dev/pacbrew-repo
          path: pacbrew-repo

      - name: Checkout SDK stubs
        uses: actions/checkout@v5
        with:
          repository: ps5-payload-dev/sdk
          path: ps5-sdk

      - name: Setup build environment
        run: |
          sudo apt update
          sudo apt install -y \
            autoconf \
            automake \
            build-essential \
            clang-18 \
            curl \
            git \
            libarchive-tools \
            libtool \
            lld-18 \
            makepkg \
            meson \
            pacman-package-manager \
            pkg-config \
            xxd \
            zip

      - name: Build PS5 payload SDK
        working-directory: pacbrew-repo/sdk
        run: |
          makepkg -c -f
          sudo pacman --noconfirm -U ./ps5-payload-*.pkg.tar.gz

      - name: Build PS5 sqlite package
        working-directory: pacbrew-repo/sqlite
        run: |
          makepkg -c -f
          sudo pacman --noconfirm -U ./ps5-payload-*.pkg.tar.gz

      - name: Build payload
        run: |
          make clean all

      - name: Create release archive
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version_tag="$(git describe --abbrev=6 --dirty --always --tags 2>/dev/null || echo "${GITHUB_SHA::7}")"
          archive_name="micromount_${version_tag}.zip"
          manifest_file=".github/release-files.txt"

          mapfile -t release_files < <(grep -Ev '^[[:space:]]*(#|$)' "${manifest_file}")

          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "Release manifest is empty: ${manifest_file}" >&2
            exit 1
          fi

          for release_file in "${release_files[@]}"; do
            if [ ! -f "${release_file}" ]; then
              echo "Missing release file: ${release_file}" >&2
              exit 1
            fi
          done

          zip -9 "${archive_name}" "${release_files[@]}"

          echo "archive_name=${archive_name}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive_name }}
          path: ${{ steps.package.outputs.archive_name }}
          if-no-files-found: error

  release:
    needs: build
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.archive_name }}
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            ## 🚀 Quick Start

            1. Ensure your ShadowMountPlus `scan_depth=2` is set to `2`. Without it, games will not be recognized.
            2. Convert your `.exfat` or `.ffpkg` games into `.ffpfsc` format using the `mkpfs` tool.

            ```bash
            # Install using pip
            pip install mkpfs

            # Convert an .exfat or .ffpkg file into a PFSC compressed image .ffpfsc
            # NOTE: .ffpfsc is the simplest way to have game-file compression support.
            mkpfs pack file --compress --verify ./GAME1234.exfat ./GAME1234.ffpfsc
            ```

            3. Ensure the new `.ffpfsc` files are uploaded to the PS5, in one of the monitored folders like `/data/homebrew`.
            4. Send or activate the `micromount.elf` payload.
          files: dist/${{ needs.build.outputs.archive_name }}
