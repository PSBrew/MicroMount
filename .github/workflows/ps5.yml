name: PS5 Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths-ignore:
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Payload
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout pacbrew-repo
        uses: actions/checkout@v5
        with:
          repository: ps5-payload-dev/pacbrew-repo
          path: pacbrew-repo

      - name: Checkout SDK stubs
        uses: actions/checkout@v5
        with:
          repository: ps5-payload-dev/sdk
          path: ps5-sdk

      - name: Setup build environment
        run: |
          sudo apt update
          sudo apt install -y \
            autoconf \
            automake \
            build-essential \
            clang-18 \
            curl \
            git \
            libarchive-tools \
            libtool \
            lld-18 \
            makepkg \
            meson \
            pacman-package-manager \
            pkg-config \
            xxd \
            zip

      - name: Build PS5 payload SDK
        working-directory: pacbrew-repo/sdk
        run: |
          makepkg -c -f
          sudo pacman --noconfirm -U ./ps5-payload-*.pkg.tar.gz

      - name: Build PS5 sqlite package
        working-directory: pacbrew-repo/sqlite
        run: |
          makepkg -c -f
          sudo pacman --noconfirm -U ./ps5-payload-*.pkg.tar.gz

      - name: Build payload
        run: |
          make clean all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: micromount-elf
          path: micromount.elf
          if-no-files-found: error

  release:
    needs: build
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: micromount-elf
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: micromount.elf
